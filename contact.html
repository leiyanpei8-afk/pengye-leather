<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - PENGYE LEATHER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Montserrat',Arial,sans-serif;background:#f6f6f6;color:#222;line-height:1.8;}
        a{text-decoration:none;}

        header{
            width:100%;
            background:#0c0c0c;
            padding:18px 6%;
            position:sticky;
            top:0;
            z-index:999;
        }
        .header-wrap{
            max-width:1400px;
            margin:0 auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .logo{
            color:#fff;
            font-size:24px;
            letter-spacing:2px;
            font-weight:600;
        }
        nav a{
            margin:0 14px;
            letter-spacing:0.5px;
            transition:0.3s;
            display:inline-flex;
            flex-direction:column;
            align-items:center;
            line-height:1.3;
        }
        nav a span{color:#fff;}
        nav a span:first-child{font-size:14px;}
        nav a span:last-child{font-size:12px;margin-top:2px;}
        nav a:hover span{color:#c4a878;}

        .contact-wrap{
            max-width:900px;
            margin:80px auto;
            padding:0 5%;
            background:#fff;
            padding:60px 40px;
            border-radius:8px;
        }
        .contact-wrap h2{
            font-size:32px;
            font-weight:600;
            color:#b07a47;
            margin-bottom:50px;
        }
        .contact-item{
            display:flex;
            align-items:center;
            margin:35px 0;
            font-size:18px;
        }
        .contact-item i{
            color:#b07a47;
            font-size:26px;
            margin-right:20px;
            width:30px;
            text-align:center;
        }
        .contact-item a{
            color:#222;
        }
        .contact-item a:hover{
            color:#b07a47;
        }
        footer{
            background:#0c0c0c;
            color:#999;
            text-align:center;
            padding:40px 0;
            font-size:14px;
            margin-top:60px;
        }
    </style>
</head>
<body>
<header>
    <div class="header-wrap">
        <div class="logo">PENGYE LEATHER</div>
        <nav>
            <a href="index.html">
                <span>Home</span>
                <span>首页</span>
            </a>
        </nav>
    </div>
</header>

<div class="contact-wrap">
    <h2>联系我们 Contact Us</h2>
    <div class="contact-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>74号地块，7A区，科兰吉工业区，卡拉奇，邮编74900，巴基斯坦</span>
    </div>
    <div class="contact-item">
        <i class="fa-solid fa-envelope"></i>
        <a href="mailto:Info@hubleather.com">Info@hubleather.com</a>
    </div>
    <div class="contact-item">
        <i class="fa-solid fa-phone"></i>
        <a href="tel:+923151299388">+923151299388</a>
    </div>
</div>

<footer>
    © PENGYE LEATHER — Premium Leather Material Supplier
</footer>
</body>
</html>
